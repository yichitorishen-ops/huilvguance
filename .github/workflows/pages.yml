name: Collect Data and Deploy Pages

on:
  schedule:
    # Beijing 00:17, Tuesday-Saturday; records the 00:00 slot.
    - cron: "17 16 * * 1-5"
    # Beijing 00:47 retry, Tuesday-Saturday; records the 00:00 slot.
    - cron: "47 16 * * 1-5"
    # Beijing 06:17, Monday-Friday; records the 06:00 slot.
    - cron: "17 22 * * 0-4"
    # Beijing 06:47 retry, Monday-Friday; records the 06:00 slot.
    - cron: "47 22 * * 0-4"
    # Beijing 13:17, Monday-Friday; records the 13:00 slot.
    - cron: "17 5 * * 1-5"
    # Beijing 13:47 retry, Monday-Friday; records the 13:00 slot.
    - cron: "47 5 * * 1-5"
    # Beijing 18:17, Monday-Friday; records the 18:00 slot.
    - cron: "17 10 * * 1-5"
    # Beijing 18:47 retry, Monday-Friday; records the 18:00 slot.
    - cron: "47 10 * * 1-5"
  workflow_dispatch:
    inputs:
      collect:
        description: "Collect a data slot before deploying"
        required: true
        type: boolean
        default: false
      scheduled_hour:
        description: "Beijing scheduled hour to collect when collect is true"
        required: false
        type: choice
        default: "6"
        options:
          - "0"
          - "6"
          - "13"
          - "18"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-data
  cancel-in-progress: false

jobs:
  collect-build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -v

      - name: Resolve collection slot
        shell: bash
        run: |
          run_collection="false"
          scheduled_hour=""
          schedule_cron=""

          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            run_collection="true"
            schedule_cron="${{ github.event.schedule }}"
          elif [[ "${{ inputs.collect }}" == "true" ]]; then
            run_collection="true"
            scheduled_hour="${{ inputs.scheduled_hour }}"
          fi

          echo "RUN_COLLECTION=$run_collection" >> "$GITHUB_ENV"
          echo "SCHEDULED_HOUR=$scheduled_hour" >> "$GITHUB_ENV"
          echo "SCHEDULE_CRON=$schedule_cron" >> "$GITHUB_ENV"

      - name: Collect data
        if: env.RUN_COLLECTION == 'true'
        shell: bash
        run: |
          if [[ -n "$SCHEDULE_CRON" ]]; then
            python scripts/collect_once.py --schedule-cron "$SCHEDULE_CRON"
          else
            python scripts/collect_once.py --scheduled-hour "$SCHEDULED_HOUR"
          fi

      - name: Build static site
        run: python scripts/build_static_site.py --output dist

      - name: Commit data history
        if: env.RUN_COLLECTION == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/sqlite.db
          if git diff --cached --quiet; then
            echo "No database changes to commit."
          else
            git commit -m "chore: update market data"
            git pull --rebase
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
