name: Collect Data and Deploy Pages

on:
  schedule:
    # Beijing 22:07-01:57, Monday-Friday UTC days; records the next 00:00 slot.
    - cron: "7,17,27,37,47,57 14,15,16,17 * * 1-5"
    # Beijing 04:07-07:57, Monday-Friday; records the 06:00 slot.
    - cron: "7,17,27,37,47,57 20,21,22,23 * * 0-4"
    # Beijing 11:07-14:57, Monday-Friday; records the 13:00 slot.
    - cron: "7,17,27,37,47,57 3,4,5,6 * * 1-5"
    # Beijing 16:07-19:57, Monday-Friday; records the 18:00 slot.
    - cron: "7,17,27,37,47,57 8,9,10,11 * * 1-5"
    # Frequent backstop; fills recently missed slots without overwriting complete slots.
    - cron: "8,18,28,38,48,58 * * * *"
  workflow_dispatch:
    inputs:
      collect:
        description: "Collect a data slot before deploying"
        required: true
        type: boolean
        default: false
      scheduled_hour:
        description: "Beijing scheduled hour to collect when collect is true"
        required: false
        type: choice
        default: "6"
        options:
          - "0"
          - "6"
          - "13"
          - "18"

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages-data
  cancel-in-progress: false

jobs:
  collect-build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -v

      - name: Resolve collection slot
        shell: bash
        run: |
          run_collection="false"
          run_catch_up="false"
          scheduled_hour=""
          schedule_cron=""
          backstop_cron="8,18,28,38,48,58 * * * *"

          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            if [[ "${{ github.event.schedule }}" == "$backstop_cron" ]]; then
              run_catch_up="true"
            else
              run_collection="true"
              schedule_cron="${{ github.event.schedule }}"
            fi
          elif [[ "${{ inputs.collect }}" == "true" ]]; then
            run_collection="true"
            scheduled_hour="${{ inputs.scheduled_hour }}"
          fi

          echo "RUN_COLLECTION=$run_collection" >> "$GITHUB_ENV"
          echo "RUN_CATCH_UP=$run_catch_up" >> "$GITHUB_ENV"
          echo "SCHEDULED_HOUR=$scheduled_hour" >> "$GITHUB_ENV"
          echo "SCHEDULE_CRON=$schedule_cron" >> "$GITHUB_ENV"

      - name: Collect data
        if: env.RUN_COLLECTION == 'true'
        shell: bash
        run: |
          if [[ -n "$SCHEDULE_CRON" ]]; then
            python scripts/collect_once.py --schedule-cron "$SCHEDULE_CRON"
          else
            python scripts/collect_once.py --scheduled-hour "$SCHEDULED_HOUR"
          fi

      - name: Catch up missing data
        if: env.RUN_CATCH_UP == 'true'
        run: python scripts/collect_once.py --catch-up --max-delay-minutes 120

      - name: Build static site
        run: python scripts/build_static_site.py --output dist

      - name: Commit data history
        if: env.RUN_COLLECTION == 'true' || env.RUN_CATCH_UP == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/sqlite.db
          if git diff --cached --quiet; then
            echo "No database changes to commit."
            echo "DATA_COMMITTED=false" >> "$GITHUB_ENV"
          else
            git commit -m "chore: update market data"
            git pull --rebase
            git push
            echo "DATA_COMMITTED=true" >> "$GITHUB_ENV"
          fi

      - name: Trigger Pages rebuild from data commit
        if: env.DATA_COMMITTED == 'true'
        shell: bash
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/pages.yml/dispatches \
            -d '{"ref":"main","inputs":{"collect":"false","scheduled_hour":"6"}}'

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
